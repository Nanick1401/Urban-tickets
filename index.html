function estimateVal(d,svc){
  var h=Number(String(d.travellers||'1').replace(/\D/g,''))||1,p=4500;
  var s=(svc||'').toLowerCase();
  if(s.includes('package')||s.includes('hotel')) p=7500;
  if(s.includes('car')) p=3000;
  var dest=(d.to||d.to_city||'').toLowerCase();
  if(['dubai','bali','maldives','mauritius','zanzibar'].some(function(x){return dest.includes(x);})) p*=3.2;
  return Math.round(p*h);
}

function App(){
  var rs=useState('home'),route=rs[0],setRoute=rs[1];
  var ls=useState([]),leads=ls[0],setLeads=ls[1];
  var us=useState(null),user=us[0],setUser=us[1];
  var ars=useState(false),authReady=ars[0],setAuthReady=ars[1];
  var cs=useState(false),chatOpen=cs[0],setChatOpen=cs[1];
  var fs=useState(null),formCfg=fs[0],setFormCfg=fs[1];
  var ts=useState(null),toast=ts[0],setToast=ts[1];

  useEffect(function(){
    // Hide splash once mounted
    var sp=document.getElementById('splash');
    if(sp){setTimeout(function(){sp.classList.add('hide');setTimeout(function(){sp.style.display='none';},400);},200);}
    if(!db){setLeads(SEEDS);setAuthReady(true);return;}
    db.auth.getSession().then(function(r){setUser(r.data.session?r.data.session.user:null);setAuthReady(true);});
    var sub=db.auth.onAuthStateChange(function(_,session){setUser(session?session.user:null);});
    return function(){if(sub&&sub.data&&sub.data.subscription)sub.data.subscription.unsubscribe();};
  },[]);

  useEffect(function(){
    if(!db){return;}
    if(!user){if(!CONFIGURED)setLeads(SEEDS);return;}
    db.from('leads').select('*').order('created_at',{ascending:false}).then(function(r){if(!r.error)setLeads((r.data||[]).map(norm));});
    var ch=db.channel('leads-rt').on('postgres_changes',{event:'*',schema:'public',table:'leads'},function(payload){
      if(payload.eventType==='INSERT')setLeads(function(p){return [norm(payload.new)].concat(p);});
      else if(payload.eventType==='UPDATE')setLeads(function(p){return p.map(function(l){return l.id===payload.new.id?norm(payload.new):l;});});
      else if(payload.eventType==='DELETE')setLeads(function(p){return p.filter(function(l){return l.id!==payload.old.id;});});
    }).subscribe();
    return function(){db.removeChannel(ch);};
  },[user]);

  var addLead=useCallback(async function(lead){
    var row={name:lead.name||null,phone:lead.phone||null,email:lead.email||null,
      from_city:lead.from||null,to_city:lead.to||null,depart_date:lead.depart||null,
      return_date:lead.ret||null,travellers:parseInt(lead.travellers)||1,
      rooms:parseInt(lead.rooms)||1,cabin_class:lead.cabin||null,vehicle_type:lead.vehicle||null,
      budget:lead.budget||null,service_type:lead.service||null,purpose:lead.purpose||null,
      source:lead.source||'Website',status:'New',
      est_value:lead.value||estimateVal(lead,lead.service)||0,notes:'',assigned_to:null};
    var saved;
    if(db&&CONFIGURED){
      var r=await db.from('leads').insert([row]).select().single();
      if(r.error){saved=Object.assign({},row,{id:uid(),created_at:new Date().toISOString()});setLeads(function(p){return [norm(saved)].concat(p);});}
      else saved=r.data;
    } else {saved=Object.assign({},row,{id:uid(),created_at:new Date().toISOString()});setLeads(function(p){return [norm(saved)].concat(p);});}
    if(EJ_ON&&window.emailjs){
      try{await emailjs.send(window.EMAILJS_SERVICE_ID,window.EMAILJS_TEMPLATE_ID,{
        to_email:EMAIL,lead_name:lead.name||'New Lead',lead_phone:lead.phone||'—',lead_email:lead.email||'—',
        from_city:lead.from||'—',to_city:lead.to||'—',depart_date:lead.depart||'—',return_date:lead.ret||'—',
        travellers:lead.travellers||'—',budget:lead.budget||'—',service:lead.service||'—',
        purpose:lead.purpose||'—',source:lead.source||'Website',full_message:buildWA(lead).replace(/\*/g,'')
      });}catch(e){console.warn('EmailJS:',e);}
    }
    flash('Enquiry for '+(lead.name||'new lead')+' saved — team notified');
    return norm(saved);
  },[]);

  var updateLead=useCallback(async function(id,patch){
    var dbp=Object.assign({},patch);
    if(patch.assignee!==undefined)dbp.assigned_to=patch.assignee;
    if(patch.value!==undefined)dbp.est_value=patch.value;
    if(db&&CONFIGURED)await db.from('leads').update(dbp).eq('id',id);
    setLeads(function(p){return p.map(function(l){return l.id===id?Object.assign({},l,patch):l;});});
  },[]);

  var removeLead=useCallback(async function(id){
    if(db&&CONFIGURED)await db.from('leads').delete().eq('id',id);
    setLeads(function(p){return p.filter(function(l){return l.id!==id;});});
  },[]);

  function flash(msg){setToast(msg);setTimeout(function(){setToast(null);},4500);}
  function openForm(cfg){setFormCfg(typeof cfg==='string'?{type:cfg}:cfg);}
  function go(id){setRoute(id);window.scrollTo(0,0);}

  return h(F,null,
    !CONFIGURED&&h(SetupBanner,null),
    h(Nav,{route:route,setRoute:go,onQuote:function(){openForm('flight');},user:user}),
    route==='home'&&h(HomePage,{setRoute:go,openForm:openForm,openChat:function(){setChatOpen(true);}}),
    route==='services'&&h(ServicesPage,{openForm:openForm}),
    route==='admin'&&h(AdminPage,{leads:leads,updateLead:updateLead,removeLead:removeLead,user:user,authReady:authReady}),
    h(FooterComp,{setRoute:go}),
    route!=='admin'&&h('div',{style:{position:'fixed',right:18,bottom:18,display:'flex',flexDirection:'column',gap:12,zIndex:60}},
      h(FBtn,{label:'Chat with us',onClick:function(){setChatOpen(true);},bg:'linear-gradient(135deg,'+C.gold+','+C.soft+')',fg:C.navy},h(ChatIco,null)),
      h('a',{href:waLink({source:'Float Button'}),target:'_blank',rel:'noreferrer',style:{textDecoration:'none'}},
